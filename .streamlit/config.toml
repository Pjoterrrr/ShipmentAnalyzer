[theme]
base = "dark"
primaryColor = "#2D81FF"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
textColor = "#F0F6FC"
font = "sans serif"

[server]
headless = true
runOnSave = false
maxUploadSize = 300
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false

[logger]
level = "error"
