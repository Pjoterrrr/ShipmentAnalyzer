[theme]
base = "dark"
primaryColor = "#7DD3FC"
backgroundColor = "#03060B"
secondaryBackgroundColor = "#101620"
textColor = "#F5F7FB"
font = "sans serif"

[server]
headless = true
runOnSave = false
maxUploadSize = 300
enableXsrfProtection = false
enableCORS = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[logger]
level = "error"
