<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" role="img" aria-label="Mercedes-Benz">
  <defs>
    <linearGradient id="mb-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1119"/>
      <stop offset="52%" stop-color="#0f1824"/>
      <stop offset="100%" stop-color="#131f2d"/>
    </linearGradient>
    <radialGradient id="mb-glow" cx="18%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#8ed8ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#8ed8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mb-metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="24%" stop-color="#dce8f6"/>
      <stop offset="50%" stop-color="#8696aa"/>
      <stop offset="78%" stop-color="#f2f7fc"/>
      <stop offset="100%" stop-color="#6a798a"/>
    </linearGradient>
    <linearGradient id="mb-metal-dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#5a6876"/>
      <stop offset="50%" stop-color="#dfe8f0"/>
      <stop offset="100%" stop-color="#546270"/>
    </linearGradient>
    <filter id="mb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="420" height="160" rx="28" fill="url(#mb-bg)"/>
  <rect width="420" height="160" rx="28" fill="url(#mb-glow)"/>

  <g transform="translate(84 80)" filter="url(#mb-shadow)">
    <circle r="48" fill="none" stroke="url(#mb-metal)" stroke-width="6"/>
    <circle r="41" fill="none" stroke="rgba(125,211,252,0.22)" stroke-width="1.8"/>

    <g fill="url(#mb-metal-dark)" stroke="url(#mb-metal)" stroke-width="1.2" stroke-linejoin="round">
      <path d="M0 -40 L7 -3 L0 0 L-7 -3 Z"/>
      <path d="M-34 19 L-4 1 L0 0 L-9 7 Z"/>
      <path d="M34 19 L9 7 L0 0 L4 1 Z"/>
    </g>

    <g stroke="url(#mb-metal)" stroke-width="4.2" stroke-linecap="round">
      <path d="M0 -39 L0 0"/>
      <path d="M0 0 L-33 19"/>
      <path d="M0 0 L33 19"/>
    </g>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="162" y="87" fill="#f4f7fb" font-size="34" font-weight="500">Mercedes-Benz</text>
    <text x="164" y="113" fill="#9cb0c7" font-size="14" letter-spacing="0.8">VL10E / Merc format</text>
  </g>
</svg>
